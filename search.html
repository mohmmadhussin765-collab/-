<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وثيقتي - البحث عن وثيقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f7f2;
            --header-bg: #2b4f43;
            --card-bg: #ffffff;
            --input-bg: #f4f2ea;
            --text-dark: #1a1a1a;
            --text-gray: #666;
            --primary-green: #345c50;
            --hover-green: #254239;
            --accent-gold: #c6a65c;
            --border-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background-color: var(--bg-color);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--primary-green);
            text-decoration: none !important;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.8;
            text-decoration: none !important;
        }

        .logo .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-gold);
            border-radius: 50%;
            display: inline-block;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            background-color: var(--primary-green);
            padding: 8px 18px;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            border: 1px solid transparent;
        }

        nav a:hover {
            background-color: var(--hover-green);
            transform: translateY(-1px);
        }

        nav a.active {
            background-color: var(--hover-green);
            border-color: var(--accent-gold);
        }

        .page-banner {
            background-color: var(--header-bg);
            color: white;
            text-align: center;
            padding: 60px 20px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .page-banner h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .page-banner p {
            font-size: 16px;
            color: #d1e0db;
            margin: 0;
        }

        .search-container {
            max-width: 650px;
            width: 100%;
            margin: -35px auto 30px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .search-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group label {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-dark);
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .search-input {
            flex-grow: 1;
            font-family: 'Cairo', sans-serif;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s ease, background-color 0.3s ease;
        }

        .search-input::placeholder { color: #999; }

        .search-input:focus {
            border-color: var(--accent-gold);
            background-color: #fff;
        }

        .btn-search {
            font-family: 'Cairo', sans-serif;
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-search i { color: var(--accent-gold); font-size: 14px; }
        .btn-search:hover { background-color: var(--hover-green); }

        .results-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            box-sizing: border-box;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--accent-gold);
            border-bottom: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .result-card:hover { transform: translateY(-5px); }

        .card-header {
            padding: 15px 20px;
            background-color: var(--input-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            margin: 0;
            color: var(--primary-green);
            font-size: 18px;
            font-weight: 700;
        }

        .badge {
            background-color: var(--primary-green);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-body { padding: 20px; }
        .card-body p { margin: 8px 0; font-size: 14px; color: var(--text-gray); }
        .card-body strong { color: var(--text-dark); }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            border-top: 1px solid var(--border-color);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: var(--primary-green);
        }

        .error-msg {
            color: #d32f2f;
            border-color: #f8d7da;
            background: #fff3f4;
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .input-row { flex-direction: column; }
            .btn-search { padding: 14px; justify-content: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <span class="dot"></span> وثيقتي
        </a>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="wathqti.html">رفع وثيقة</a>
            <a href="search.html" class="active">البحث</a>
            <a href="contact.html">التواصل</a>
        </nav>
    </header>

    <div class="page-banner">
        <h1>البحث عن وثيقتي <span style="font-size: 28px;">🔍</span></h1>
        <p>ابحث باسمك الثلاثي للعثور على وثيقتك المفقودة</p>
    </div>

    <main class="search-container">
        <div class="search-card">
            <div class="form-group">
                <label>الاسم الثلاثي كاملاً</label>
                <form class="input-row" onsubmit="searchDocument(event)">
                    <input type="text" id="searchInput" class="search-input" placeholder="مثال: محمد علي أحمد" required>
                    <button type="submit" class="btn-search">
                        بحث <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="resultsContainer" class="results-container"></div>

    <script>
        async function searchDocument(event) {
            event.preventDefault();
            const queryName = document.getElementById('searchInput').value.trim();
            const resultsContainer = document.getElementById('resultsContainer');
            if (!queryName) return;

            resultsContainer.innerHTML = "<div class='status-msg'>جاري البحث في قاعدة البيانات... ⏳</div>";

            try {
                const response = await fetch(`http://127.0.0.1:5000/search-id?name=${encodeURIComponent(queryName)}`);
                const data = await response.json();
                resultsContainer.innerHTML = "";

                if (data.count === 0) {
                    resultsContainer.innerHTML = `<div class='status-msg error-msg'>عذراً، لم يتم العثور على وثائق تطابق الاسم: "${queryName}"</div>`;
                    return;
                }

                data.results.forEach(doc => {
                    resultsContainer.innerHTML += `
                        <div class="result-card">
                            <div class="card-header">
                                <h3>${doc.full_name}</h3>
                                <span class="badge">${doc.doc_type}</span>
                            </div>
                            <div class="card-body">
                                <p><strong>👤 اسم الواجد:</strong> ${doc.finder_name}</p>
                                <p><strong>📞 طريقة التواصل:</strong> <span dir="ltr">${doc.contact_info}</span></p>
                                <p><strong>📍 مكان العثور:</strong> ${doc.location_found}</p>
                                <p><strong>📅 تاريخ الرفع:</strong> <span dir="ltr">${doc.upload_date}</span></p>
                            </div>
                            <img src="${doc.processed_image}" alt="صورة الوثيقة" class="card-image">
                        </div>`;
                });
            } catch (error) {
                resultsContainer.innerHTML = "<div class='status-msg error-msg'>حدث خطأ في الاتصال بالسيرفر. يرجى التأكد من تشغيل ملف (app.py) في الخلفية.</div>";
            }
        }
    </script>
</body>
</html>
