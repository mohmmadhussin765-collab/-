<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وثيقتي - Wathiqati</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8f7f2;
            --text-dark: #1a1a1a;
            --text-gray: #555;
            --primary-green: #345c50;
            --hover-green: #254239;
            --accent-gold: #c6a65c;
            --nav-bg: #2e5347;
            --nav-border: #3d6b5c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            background-color: var(--nav-bg);
            height: 64px;
            box-shadow: 0 2px 12px rgba(52, 92, 80, 0.25);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
            text-decoration: none !important;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.85;
            text-decoration: none !important;
        }

        .logo .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-gold);
            border-radius: 50%;
            display: inline-block;
        }

        nav {
            display: flex;
            gap: 6px;
        }

        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.80);
            font-weight: 600;
            font-size: 15px;
            padding: 7px 16px;
            border-radius: 7px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
        }

        nav a.active {
            background-color: rgba(255, 255, 255, 0.18);
            color: #ffffff;
        }

        /* ===== HERO ===== */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .ai-badge {
            background-color: #e8eae3;
            color: var(--primary-green);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #dcded8;
        }

        .ai-badge i {
            color: #8a6be8;
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            margin: 0 0 20px 0;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 18px;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
        }

        button {
            font-family: 'Cairo', sans-serif;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--hover-green);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid #ccc;
        }

        .btn-secondary:hover {
            background-color: rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span class="dot"></span> وثيقتي
        </a>
        <nav>
            <a href="#" class="active">الرئيسية</a>
            <a href="wathqti.html">رفع وثيقة</a>
            <a href="search.html">البحث</a>
            <a href="contact.html">التواصل</a>
        </nav>
    </header>

    <main class="hero">
        <div class="ai-badge">
            مدعوم بالذكاء الاصطناعي <i class="fa-solid fa-robot"></i>
        </div>
        
        <h1>وثّق، ابحث، استرجع</h1>
        
        <p class="subtitle">
            منصة ذكية لاسترجاع الوثائق المفقودة. نحمي خصوصيتك ونوصلك <br> بمن وجد وثيقتك.
        </p>

        <div class="buttons-container">
            <a href="wathqti.html" style="text-decoration: none;">
                <button class="btn-primary">
                    رفع وثيقة مُعثور عليها <i class="fa-solid fa-box-archive" style="color: #a8b8e0;"></i>
                </button>
            </a>
            <a href="search.html" style="text-decoration: none;">
                <button class="btn-secondary">
                    البحث عن وثيقتي <i class="fa-solid fa-magnifying-glass" style="color: #72b6f2;"></i>
                </button>
            </a>
        </div>
    </main>

</body>
</html>
